# Product-owned config consumed by mysql-source.
default_page_size: 500
max_page_size: 5000
snapshot_ttl_ms: 300000

endpoints:
  - object_ref: mysql-prod
    endpoint_uri: mysql://mysql-prod.internal:3306
    credential_ref: mysql-prod-reader
    schema_scopes:
      - app
    table_scopes:
      - "*"
    primary_key: id

# Credential entries hold references only. Secret bytes come from the local
# runtime environment, not from Capanix grants or manifest config.
credentials:
  - credential_ref: mysql-prod-reader
    auth_type: basic_env
    username_env: MYSQL_PROD_READER_USERNAME
    password_env: MYSQL_PROD_READER_PASSWORD

# Example runtime overlay for local tests only. In production this section is
# injected by the Capanix runtime/grant path rather than authored as product
# config. Capanix still carries no password material here.
__cnx_runtime:
  local_host_ref: mysql-source-node-a
  resource_grants:
    - resource_kind: mysql
      object_ref: mysql-prod
      endpoint_ref: prod-db-a
      grant_state: active
      grant_epoch: 1
      interfaces:
        - read
      schema_scopes:
        - app
      table_scopes:
        - users
        - orders
