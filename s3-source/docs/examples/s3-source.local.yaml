# Product-owned config consumed by s3-source.
default_page_size: 1000
max_page_size: 10000

endpoints:
  - object_ref: s3-prod
    endpoint_uri: https://s3.us-east-1.amazonaws.com
    bucket: fustor-prod-logs
    region: us-east-1
    prefix: logs/
    credential_ref: s3-prod-reader
    bucket_scopes:
      - fustor-prod-logs
    prefix_scopes:
      - logs/2026/*

# Credential entries hold references only. Secret bytes come from the local
# runtime environment, not from Capanix grants or manifest config.
credentials:
  - credential_ref: s3-prod-reader
    auth_type: basic_env
    username_env: S3_PROD_ACCESS_KEY_ID
    password_env: S3_PROD_SECRET_ACCESS_KEY

# Example runtime overlay for local tests only. In production this section is
# injected by the Capanix runtime/grant path rather than authored as product
# config. Capanix still carries no access key material here.
__cnx_runtime:
  local_host_ref: s3-source-node-a
  resource_grants:
    - resource_kind: s3
      object_ref: s3-prod
      endpoint_ref: prod-bucket-a
      grant_state: active
      grant_epoch: 1
      interfaces:
        - read
      bucket_scopes:
        - fustor-prod-logs
      prefix_scopes:
        - logs/2026/*
