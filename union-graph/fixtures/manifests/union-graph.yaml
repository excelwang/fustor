ports:
  - route_token: union-graph.internal
    use_port: query
    dispatch_tag: query
    pattern: request_reply
    route_key: union-graph.query:v1
    visibility: internal
    roles:
      - serve
      - use
  - route_token: union-graph.internal
    use_port: ingest
    dispatch_tag: ingest
    pattern: request_reply
    route_key: union-graph.ingest:v1
    visibility: internal
    roles:
      - serve
      - use
